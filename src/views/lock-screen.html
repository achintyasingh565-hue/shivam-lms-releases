<div id="lockScreen" class="lockscreen show">
  <button class="auth-theme" onclick="toggleAuthTheme()" title="Toggle light / dark"><span id="authThemeIc">☾</span></button>
  <div class="auth-wrap">
    <div class="auth-brand">
      <svg class="auth-graph" viewBox="0 0 300 460" preserveAspectRatio="none"><defs><linearGradient id="agA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4f86d6" stop-opacity=".85"/><stop offset="1" stop-color="#4f86d6" stop-opacity="0"/></linearGradient></defs><path d="M0,300 L42,282 L84,302 L126,250 L168,272 L210,206 L252,236 L300,176 L300,460 L0,460 Z" fill="url(#agA)"/><polyline points="0,300 42,282 84,302 126,250 168,272 210,206 252,236 300,176" fill="none" stroke="#c8a02a" stroke-width="1.6" opacity=".75"/></svg>
      <svg class="auth-sky" viewBox="0 0 320 150" preserveAspectRatio="none"><g fill="#11264a"><rect x="6" y="70" width="22" height="80"/><rect x="32" y="52" width="26" height="98"/><rect x="62" y="86" width="20" height="64"/><rect x="86" y="40" width="28" height="110"/><rect x="118" y="64" width="22" height="86"/><rect x="144" y="30" width="30" height="120"/><rect x="178" y="58" width="24" height="92"/><rect x="206" y="44" width="28" height="106"/><rect x="238" y="74" width="22" height="76"/><rect x="264" y="50" width="28" height="100"/><rect x="296" y="68" width="20" height="82"/></g><g fill="#3a6cbf" opacity=".6"><rect x="40" y="60" width="3" height="4"/><rect x="47" y="60" width="3" height="4"/><rect x="95" y="50" width="3" height="4"/><rect x="102" y="50" width="3" height="4"/><rect x="153" y="40" width="3" height="4"/><rect x="160" y="40" width="3" height="4"/><rect x="215" y="54" width="3" height="4"/><rect x="273" y="60" width="3" height="4"/></g></svg>
      <div class="auth-name">SHIVAM<br>ENTERPRISES</div>
      <div class="auth-divider"></div>
      <div class="auth-tag">Loan Management System</div>
      <div class="auth-badge">Enterprise Edition</div>
    </div>
    <div class="auth-card" id="authCard">
      <div class="auth-mark"><span>SE</span></div>
      <div class="auth-welcome" id="authWelcome">Welcome Back</div>
      <div class="auth-sub" id="authSub">Sign in to continue</div>
      <label class="auth-label">Username</label>
      <div class="auth-field">
        <span class="auth-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input id="lockUser" type="text" placeholder="Enter your username" autocapitalize="off" autocomplete="username" onkeydown="if(event.key==='Enter')authSubmit()">
      </div>
      <label class="auth-label">Password</label>
      <div class="auth-field">
        <span class="auth-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input id="lockPass" type="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')authSubmit()">
        <button type="button" class="auth-eye" id="pwToggle" onclick="togglePw()">Show</button>
      </div>
      <div class="auth-field" id="lockPass2Field" style="display:none;">
        <span class="auth-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input id="lockPass2" type="password" placeholder="Re-enter password" autocomplete="new-password" onkeydown="if(event.key==='Enter')authSubmit()">
      </div>
      <div class="auth-row" id="authRow">
        <label class="auth-remember"><input type="checkbox" id="rememberMe"> Remember me</label>
        <a class="auth-forgot" onclick="showForgot()">Forgot password?</a>
      </div>
      <div class="lock-err" id="lockErr"></div>
      <div class="auth-info" id="authInfo" style="display:none;"></div>
      <button class="auth-btn" id="signinBtn" onclick="authSubmit()"><span id="signinLabel">Sign In</span><span class="auth-spin"></span></button>
      <button id="touchBtn" class="auth-bio" style="display:none;" onclick="touchUnlock()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11v3M7 12a5 5 0 0 1 10 0v2a7 7 0 0 1-1 3.6M5 16v-4a7 7 0 0 1 9-6.7"/></svg> Use Touch ID</button>
      <div class="auth-bio-ph" id="bioPlaceholder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11v3M7 12a5 5 0 0 1 10 0v2a7 7 0 0 1-1 3.6M5 16v-4a7 7 0 0 1 9-6.7"/></svg> Biometric login coming soon</div>
      <div class="auth-sec">
        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg> Password Protected</span>
        <span class="auth-sec-div"></span>
        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.4 2.4 4.6-5"/></svg> Audit Logging Enabled</span>
      </div>
      <div class="auth-meta"><span id="lastLogin"></span></div>
      <div class="auth-meta auth-verline">Version 2.0.0 &nbsp;·&nbsp; © Shivam Enterprises</div>
    </div>
  </div>
</div>
